<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Cripto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="css/styles.css">
    

</head>

<body class="bg-dark text-light">

<div class="container py-5">
    <h1 class="text-center mb-4">💱 Convertidor de Criptomonedas</h1>

    <div class="card bg-secondary p-4">
    <form id="formConvertidor">
        <div class="mb-3">
        <label class="form-label">Criptomoneda</label>
        <select id="criptoSelect" class="form-select">
        <Option>Bitcoin</option>
        <Option>Ethereum</option>
        <Option>USDT</option>
        <Option>Peso Argentino</option>
        </select>
        
    </div>

    <div class="mb-3">
        <label class="form-label">Monto</label>
        <input type="number" id="montoInput" class="form-control" value="1" min="0">
    </div>

    <div class="mb-3">
        <label class="form-label">Convertir a</label>
        <select id="monedaSelect" class="form-select">
            <Option>Bitcoin</option>
            <Option>Ethereum</option>
            <Option>USDT</option>
            <Option>Peso Argentino</option>
            </select>
</select>
    </div>

    <button type="submit" class="btn btn-warning w-100">Convertir</button>
    </form>
    </div>

    <div class="mt-4">
    <h3>Resultado:</h3>
    <p id="resultado" class="fs-4 text-success"></p>
    </div>

<script src="js/main.js"></script>

</body>
</html>
